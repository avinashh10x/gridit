<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="7" height="7" rx="1" fill="currentColor" opacity="0.8" />
        <rect x="14" y="3" width="7" height="7" rx="1" fill="currentColor" opacity="0.6" />
        <rect x="3" y="14" width="7" height="7" rx="1" fill="currentColor" opacity="0.6" />
        <rect x="14" y="14" width="7" height="7" rx="1" fill="currentColor" opacity="0.4" />
      </svg>
    </div>
    <span class="header-title">Gridly</span>
    <span class="header-version">v1.0</span>
  </div>

  <!-- Selection Status -->
  <div class="status-bar" id="statusBar">
    <span class="status-dot idle" id="statusDot"></span>
    <span class="status-text" id="statusText">No artwork selected</span>
  </div>

  <!-- Warnings (hidden by default) -->
  <div class="inline-warning hidden" id="warningBar">
    <span class="inline-warning-icon">⚠</span>
    <span class="inline-warning-text" id="warningText"></span>
  </div>

  <!-- Grid Type Selector -->
  <div class="section">
    <div class="section-label">Grid Type</div>
    <div class="segmented-group" id="gridTypeGroup">
      <button class="segmented-btn active" data-type="square">Square</button>
      <button class="segmented-btn" data-type="circular">Circular</button>
      <button class="segmented-btn" data-type="hybrid">Hybrid</button>
    </div>
  </div>

  <!-- Grid Controls -->
  <div class="section" id="gridControlsSection">
    <div class="section-label">Grid Settings</div>

    <!-- Density -->
    <div class="control-row">
      <span class="control-label">Density</span>
      <div class="slider-wrap">
        <input type="range" id="densitySlider" min="2" max="20" value="8" step="1" />
        <span class="control-value" id="densityValue">8</span>
      </div>
    </div>

    <!-- Opacity -->
    <div class="control-row">
      <span class="control-label">Opacity</span>
      <div class="slider-wrap">
        <input type="range" id="opacitySlider" min="10" max="100" value="40" step="5" />
        <span class="control-value" id="opacityValue">40%</span>
      </div>
    </div>

    <!-- Visibility Toggle -->
    <div class="control-row">
      <span class="control-label">Visible</span>
      <label class="toggle-wrap">
        <input type="checkbox" id="visibilityToggle" checked />
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <!-- Circular Grid Controls (shown when Circular or Hybrid selected) -->
  <div class="section hidden" id="circularControlsSection">
    <div class="section-label">Circle Settings</div>

    <!-- Ring Count -->
    <div class="control-row">
      <span class="control-label">Rings</span>
      <div class="slider-wrap">
        <input type="range" id="ringSlider" min="2" max="12" value="5" step="1" />
        <span class="control-value" id="ringValue">5</span>
      </div>
    </div>

    <!-- Center Marker -->
    <div class="control-row">
      <span class="control-label">Center marker</span>
      <label class="toggle-wrap">
        <input type="checkbox" id="centerMarkerToggle" checked />
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <hr class="section-divider" />

  <!-- Clear Space Controls -->
  <div class="section">
    <div class="section-label">Clear Space</div>

    <!-- Clear Space Toggle -->
    <div class="control-row">
      <span class="control-label">Enable</span>
      <label class="toggle-wrap">
        <input type="checkbox" id="clearSpaceToggle" />
        <span class="toggle-slider"></span>
      </label>
    </div>

    <!-- Unit Definition (shown when clear space enabled) -->
    <div class="control-row hidden" id="clearSpaceUnitRow">
      <span class="control-label">Unit based on</span>
      <select id="clearSpaceUnit" style="flex: 1; margin-left: 12px;">
        <option value="width">Logo width</option>
        <option value="height">Logo height</option>
        <option value="stroke">Stroke width</option>
      </select>
    </div>

    <!-- Clear Space Opacity -->
    <div class="control-row hidden" id="clearSpaceOpacityRow">
      <span class="control-label">Opacity</span>
      <div class="slider-wrap">
        <input type="range" id="clearSpaceOpacitySlider" min="10" max="100" value="50" step="5" />
        <span class="control-value" id="clearSpaceOpacityValue">50%</span>
      </div>
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="actions">
    <button class="btn btn-primary" id="btnGenerateGrid" disabled>Generate Grid</button>
    <button class="btn btn-secondary" id="btnGenerateClearSpace" disabled>Generate Clear Space</button>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-status" id="footerStatus">Ready</div>
  </div>

  <!-- Scripts -->
  <script src="src/utils.js"></script>
  <script src="src/layers.js"></script>
  <script src="src/selection.js"></script>
  <script src="src/grid-square.js"></script>
  <script src="src/grid-circular.js"></script>
  <script src="src/grid-hybrid.js"></script>
  <script src="src/clear-space.js"></script>
  <script src="src/ui.js"></script>
  <script src="index.js"></script>

</body>
</html>
